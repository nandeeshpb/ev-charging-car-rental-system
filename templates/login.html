{% extends "base.html" %}

{% block title %}Login | UNICCARS{% endblock %}

{% block content %}
<section class="auth-page">
    <form class="auth-card reveal" method="POST">
        <p class="eyebrow">Member access</p>
        <h1>Login</h1>
        <p class="muted">Use your verified email to access the UNICCARS dashboard.</p>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button class="btn btn-primary full" type="submit">Login</button>
        <p class="form-note"><strong></strong> / <strong></strong></p>
        <p class="form-note">New to UNICCARS? <a href="{{ url_for('register') }}">Create account</a></p>
    </form>
</section>
{% endblock %}
